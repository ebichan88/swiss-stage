name: AI QA

# 受け入れケース台帳(.claude/05_acceptance/)とPR差分の突合レビュー。
# ai-review.yml と独立に動き、レポートのみ(非ゲート・Fixer連携なし)。
# QAのFAILをFixerに流すと「AIが台帳=仕様を書き換えて指摘を閉じる」経路が
# できてしまうため、意図的にループを持たない。
on:
  pull_request:
    # unlabeled: needs-humanラベルを外した際に自動処理を再開するため
    types: [opened, synchronize, ready_for_review, unlabeled]
    # 純ドキュメントPR(挙動が変わらない)はスキップ
    paths-ignore:
      - '**.md'

concurrency:
  group: ai-qa-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  qa:
    # needs-humanラベル付きPRはAI自動処理を停止する(ai-review.ymlと同じ規約)。
    # unlabeledイベントはneeds-human以外のラベル除去では発火させない
    if: ${{ !github.event.pull_request.draft && !contains(github.event.pull_request.labels.*.name, 'needs-human') && (github.event.action != 'unlabeled' || github.event.label.name == 'needs-human') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: AI QA
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # ai-review.ymlのFixerがpushするとsynchronizeイベントのactorがclaude[bot]になり、
          # このワークフローも同じPRに対して再トリガーされる。デフォルトのbot拒否を解除する
          allowed_bots: "*"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            あなたはこのリポジトリのQAエージェントです。
            `.claude/agents/qa.md` を読み、その指示に厳密に従ってこのPRを受け入れケース台帳と突合してください。
            差分は `gh pr diff ${{ github.event.pull_request.number }}` で取得します。

            レポートの投稿(1PRにつき1コメントを更新し続けるsticky方式):
            1. レポートを一時ファイル(例: /tmp/qa-report.md)に書き出す
            2. `gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments --paginate --jq '.[] | select(.body | startswith("<!-- swiss-stage-ai-qa -->")) | .id'` で既存のQAコメントを探す
            3. 見つかったら `gh api --method PATCH repos/${{ github.repository }}/issues/comments/<ID> -F body=@/tmp/qa-report.md` で更新する
            4. 見つからなければ `gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/qa-report.md` で新規投稿する

            レポートはPRコメントとしてのみ投稿してください。結果をメッセージ本文に出力しないでください。
          claude_args: |
            --allowedTools "Read,Grep,Glob,Write,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh api:*),Bash(git diff:*),Bash(git log:*),Bash(grep:*),Bash(sort:*),Bash(comm:*),Bash(wc:*)"
