name: CI
on:
  pull_request:
  push:
    branches: [main]
  # AI Fixerの修正コミットがイベントを発火しない場合に ai-review.yml から起動する
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: OpenAPIスキーマのlint(API契約のSSoT)
        run: npx -y @redocly/cli@1 lint ../schema/openapi.yaml
      - name: 生成型の鮮度チェック(schema変更にgenerate:apiが追随しているか)
        run: |
          npm run generate:api
          git diff --exit-code src/types/generated/
      - run: npm run lint
      - run: npm run format:check
      - run: npm run type-check
      - run: npm run test
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      dynamodb-local:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - name: Create DynamoDB Local table
        run: ./scripts/create-table.sh
        env:
          DYNAMODB_ENDPOINT: http://localhost:8000
      - run: ./gradlew check build
