spring:
  application:
    name: swiss-stage
  web:
    resources:
      # 静的配信はWebMvcConfigで明示定義(SPAフォールバック + Cache-Control)。デフォルトは無効化
      add-mappings: false
  servlet:
    multipart:
      max-file-size: 1MB     # CSVインポート上限(13_security_design.md §4)
      max-request-size: 2MB
  security:
    oauth2:
      client:
        registration:
          google:
            # 本番は環境変数で注入。デフォルトは起動を通すためのダミー(ログインは失敗する)
            client-id: ${GOOGLE_OAUTH_CLIENT_ID:unset-client-id}
            client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:unset-client-secret}
            scope: openid, profile
            # Google Cloud Consoleに登録するリダイレクトURI: https://{ドメイン}/api/v1/auth/callback
            redirect-uri: "{baseUrl}/api/v1/auth/callback"

server:
  # ALB配下でX-Forwarded-*からクライアントIP・スキームを復元(レート制限・OAuth2リダイレクトに必要)
  forward-headers-strategy: framework
  # 共有ページ集約(300名で~90KB)を会場の低速回線でも3秒以内に返すため圧縮する
  # (14_performance_optimization.md §1。JSON/JS/CSSが対象、2KB未満は非圧縮)
  compression:
    enabled: true

management:
  endpoints:
    web:
      base-path: /api/v1
      exposure:
        include: health   # 公開するのはhealthのみ(15_performance_monitoring.md)
  endpoint:
    health:
      probes:
        enabled: true

app:
  dynamodb:
    table-name: swiss-stage
    endpoint: ""          # 空 = AWS本番(EC2インスタンスロール)。localプロファイルで上書き
  auth:
    jwt-secret: ${JWT_SECRET:}   # 32文字以上必須。本番は環境変数で注入(リポジトリに書かない)
    secure-cookie: true          # ローカル(http)のみlocalプロファイルで無効化
    frontend-base-url: ""        # 空 = 同一オリジン。開発でVite(:5173)へ戻す場合のみ上書き
  rate-limit:
    shared:                      # /api/v1/shared/** のIPベースレート制限(13_security_design.md §5)
      capacity: 60
      refill-per-minute: 60
  cache:
    shared:                      # 共有ページ集約のインメモリキャッシュTTL(14_performance_optimization.md §3)
      ttl-seconds: 30
