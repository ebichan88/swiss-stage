services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    # -sharedDb 必須: ないと認証情報ごとにDBが分かれて「テーブルがない」事故になる
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /data"
    # named volume は root 所有で作られるが、プロセスは uid 1000 で動くため
    # root で実行しないと SQLite が /data に書けずクラッシュループする(ローカル専用なので許容)
    user: root
    volumes:
      - dynamodb-data:/data

volumes:
  dynamodb-data:
